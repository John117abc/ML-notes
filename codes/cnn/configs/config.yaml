# configs/config.yaml
seed: 42
device: cuda
cudnn_deterministic: true
cudnn_benchmark: false
epochs: 100
#output_dir: "./outputs/exp_01"

data:
  root: "/home/jiangchengxuan/dataset/digit-recognizer-challenge"
  batch_size: 128
  img_size: 28
  train_csv: "/home/jiangchengxuan/dataset/digit-recognizer-challenge/train.csv"
  val_ratio: 0.2
  test_csv: "/home/jiangchengxuan/dataset/digit-recognizer-challenge/test.csv"
  num_workers: 10

model:
  name: "LeNet"
  model_args:
    num_classes: 10
    in_channels: 1

train:
  epochs: 5
  lr: 0.001
  weight_decay: 1e-4
  save_dir: "./checkpoints"
  log_dir: "./logs"
  batch_size: 64
  save_path: "./checkpoints/model.pth"

eval:
  batch_size: 100